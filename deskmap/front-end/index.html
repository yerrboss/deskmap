<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeskMap – Classroom Seat Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-background"></div>
  <div class="glass-container">
    <header class="glass-header">
      <div class="header-branding">
        <h1>DeskMap</h1>
        <p>Intelligent Seating Arrangements</p>
      </div>
      <div class="header-actions">
        <!-- View toggle -->
        <label class="toggle-switch">
          <input type="checkbox" id="studentViewToggle" />
          <span class="slider round"></span>
          <span class="toggle-label">Student POV</span>
        </label>
        <button id="printBtn" class="btn btn-primary">Print Map</button>
      </div>
    </header>

    <main class="main-layout">
      <!-- Sidebar for Controls -->
      <aside class="sidebar">
        <div class="section glass-panel">
          <h3>Class Details</h3>
          <div class="input-group">
            <label>Teacher ID</label>
            <input type="text" id="teacherId" placeholder="e.g. Mr. Smith" />
          </div>
          <div class="input-group">
            <label>Class Period</label>
            <select id="classSet">
              <option value="Mon_AM">Mon AM</option>
              <option value="Mon_PM">Mon PM</option>
              <option value="Tue_AM">Tue AM</option>
              <option value="Tue_PM">Tue PM</option>
              <option value="Wed_AM">Wed AM</option>
              <option value="Wed_PM">Wed PM</option>
              <option value="Thu_AM">Thu AM</option>
            </select>
          </div>
          <div style="display:flex; gap:10px; width:100%;">
            <button id="loadBtn" class="btn btn-secondary" style="flex: 1;">Load Class</button>
            <button id="saveBtn" class="btn btn-primary" style="flex: 1;">Save Class</button>
          </div>
        </div>

        <div class="section glass-panel">
          <h3>Student Import</h3>
          <div class="input-group file-import">
            <label for="excelFile" class="file-label">Import Excel (.xlsx, .csv)</label>
            <input type="file" id="excelFile" accept=".xlsx, .xls, .csv" />
          </div>
          <div class="input-divider"><span>OR</span></div>
          <div class="input-group">
            <label>Paste Names (1 per line)</label>
            <textarea id="nameInput" rows="4" placeholder="Jane Doe&#10;John Smith"></textarea>
          </div>
          <div style="display: flex; gap: 10px; width: 100%;">
            <button id="pasteNamesBtn" class="btn btn-primary" style="flex: 1;">Generate Seating</button>
            <button id="clearBtn" class="btn btn-secondary">Clear</button>
          </div>
        </div>

        <div class="section glass-panel">
          <h3>Class Notes</h3>
          <textarea id="notesInput" rows="2" placeholder="Seating rules, reminders..."></textarea>
        </div>
      </aside>

      <!-- Main Seating Area -->
      <section class="seating-area">
        <div class="room-wrapper" id="roomWrapper">
          <div class="room-controls" style="justify-content: flex-end;">
             <button id="adjustBtn" class="icon-btn" title="Click to Adjust Geometry">🔒</button>
          </div>

          <div class="teacher-desk-anchor" id="teacherDeskAnchor">
            <div class="desktop-spacer"></div>
            <div class="teacher-desk">Front of Room</div>
            <div class="desktop-right-container" style="gap: 5px; align-items: center;">
              <select id="layoutPreset" class="preset-dropdown">
                <option value="standard">Standard Grid (5x5)</option>
                <option value="ushape">U-Shape Classroom</option>
                <option value="groups">Group Clusters (of 4)</option>
                <option value="custom">Create New Layout...</option>
              </select>
              <button id="saveTemplateBtn" class="icon-btn" title="Save Geometry to Selected Template" style="width: 36px; height: 36px; font-size: 0.95rem;">💾</button>
              <button id="deleteTemplateBtn" class="icon-btn" title="Delete Custom Template" style="width: 36px; height: 36px; font-size: 0.95rem; display: none; background: rgba(220, 38, 38, 0.4);">🗑️</button>
            </div>
          </div>
          
          <div class="grid-container" id="gridContainer">
            <div id="chartGrid" class="grid-board"></div>
            <div id="editorTooltip" class="editor-tooltip" style="white-space: nowrap;">Shift+Click to select tables! Drag globally. Dbl-Click Edit/Spawn. Right-Click Delete.</div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- New Layout Modal -->
  <div id="templateModal" class="modal-overlay" style="display: none;">
    <div class="glass-panel modal-content">
      <h3 style="margin-bottom: 5px;">Create Template</h3>
      <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 12px;">Save a new custom layout to your dropdown.</p>
      <input type="text" id="templateNameInput" placeholder="e.g. Science Lab" style="margin-bottom: 15px;" />
      <div style="display: flex; gap: 10px;">
        <button id="confirmTemplateBtn" class="btn btn-primary" style="flex:1;">Save Layout</button>
        <button id="cancelTemplateBtn" class="btn btn-secondary" style="flex:1;">Cancel</button>
      </div>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
